      h+=field('Precio','text',c.price,`upd('${sec.id}','price',this.value)`,'$0.00');
      h+=field('Texto botón','text',c.btnText,`upd('${sec.id}','btnText',this.value)`,'Comprar ahora');
      h+=colorField('Color botón',c.btnColor||'#A78BFA',`upd('${sec.id}','btnColor',this.value)`);
      h+=tog('Mostrar título',c.showTitle,`upd('${sec.id}','showTitle',!sec.content.showTitle)`);
      h+=tog('Mostrar descripción',c.showDesc,`upd('${sec.id}','showDesc',!sec.content.showDesc)`);
      h+=tog('Mostrar precio',c.showPrice,`upd('${sec.id}','showPrice',!sec.content.showPrice)`);
      h+=tog('Mostrar botón',c.showBtn,`upd('${sec.id}','showBtn',!sec.content.showBtn)`);
      break;
    case 'ideas':
      h+=field('Título','text',c.title,`upd('${sec.id}','title',this.value)`,'💡 Mis ideas');
      h+=field('Nota descriptiva','text',c.note||'',`upd('${sec.id}','note',this.value)`,'Descripción...');
      h+=`<div style="margin-top:12px;display:flex;flex-direction:column;gap:6px">
        <button onclick="openPaintModal('${sec.id}')" style="width:100%;padding:11px;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:.8rem;font-family:inherit">🎨 Abrir lienzo de ideas</button>
        ${c.drawing?`<button onclick="upd('${sec.id}','drawing','');renderCanvas()" style="width:100%;padding:7px;background:transparent;color:var(--danger);border:1px solid rgba(239,68,68,.2);border-radius:6px;cursor:pointer;font-size:.72rem;font-family:inherit">🗑 Borrar dibujo actual</button>`:''}
      </div>`;
      break;
    case 'bloques':{
      h+=field('Título sección','text',c.title,`upd('${sec.id}','title',this.value)`,'');
      h+=chips('Columnas',String(c.cols||2),['1','2','3'],`upd('${sec.id}','cols',+v)`);
      h+=`<div class="prop-group"><label class="prop-label">Separación (${c.gap||24}px)</label>
        <input type="range" class="range-field" min="0" max="64" step="4" value="${c.gap||24}"
          oninput="upd('${sec.id}','gap',+this.value)"></div>`;
      h+=`<span class="divider-label">Bloques (${(c.blocks||[]).length}/3)</span>`;
      (c.blocks||[]).forEach((b,bi)=>{
        h+=`<div class="sub-item"><div class="sub-item-head"><span class="sub-item-title">🧱 Bloque ${bi+1}</span>
          <button class="sub-del-btn" onclick="delBloque('${sec.id}',${bi})">✕</button></div>
          ${field('Título','text',b.titulo||'',`updBloque('${sec.id}',${bi},'titulo',this.value)`,'Título')}
          ${field('Texto','textarea',b.texto||'',`updBloque('${sec.id}',${bi},'texto',this.value)`,'Contenido...')}
          ${chips('Imagen',String(b.showImg||false),[['true','Con imagen'],['false','Sin imagen']],`updBloque('${sec.id}',${bi},'showImg',v==='true')`)}
          ${b.showImg?imgField('Imagen',b.img,`requestImgUpload(url=>{secById('${sec.id}').content.blocks[${bi}].img=url;mu();renderCanvas()})`,true):''}
          ${tog('Con padding',b.padded!==false,`updBloque('${sec.id}',${bi},'padded',!sec.content.blocks[${bi}].padded)`)}
          ${tog('Borde',b.border||false,`updBloque('${sec.id}',${bi},'border',!sec.content.blocks[${bi}].border)`)}
          ${tog('Mostrar botón',b.showBtn||false,`updBloque('${sec.id}',${bi},'showBtn',!sec.content.blocks[${bi}].showBtn)`)}
          ${b.showBtn?field('Texto botón','text',b.btnText||'Ver más',`updBloque('${sec.id}',${bi},'btnText',this.value)`):''}
          ${colorField('Fondo',b.bg||'#F9FAFB',`updBloque('${sec.id}',${bi},'bg',this.value)`)}
        </div>`;
      });
      if((c.blocks||[]).length<3){
        h+=`<button class="add-sub-btn" onclick="addBloque('${sec.id}')">＋ Añadir bloque</button>`;
      }else{
        h+=`<p style="font-size:.68rem;color:var(--ui-text3);text-align:center;padding:6px 0;opacity:.7">Máximo 3 bloques por sección</p>`;
      }
      break;
    }
  }
  return`<div>${h}</div>`;
}

/* ═══════════════════════════════════════════════════
   DESIGN PANEL (per section background/padding/color)
═══════════════════════════════════════════════════ */
function designPanel(sec){
  const bg=sec.bg||{};
  const G=site.global;
  const sid=sec.id;
  let h=``;

  /* ── FONDO ── */
  h+=`<span class="divider-label">🎨 Fondo de la sección</span>`;
  h+=chips('Tipo',bg.type||'color',[['color','Color'],['gradient','Gradiente'],['image','Imagen'],['dark','Oscuro']],`setBg('${sid}','type',v)`);

  if(bg.type==='color'||!bg.type){
    h+=colorField('Color de fondo',bg.color||'#ffffff',`setBg('${sid}','color',this.value)`);
    /* Quick swatches */
    h+=`<div class="prop-group"><label class="prop-label">Colores rápidos</label>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${['#ffffff','#F9FAFB','#F3F4F6','#111827','#1E293B','#0F172A','#EFF6FF','#FFF7ED','#F0FDF4','#FDF2F8'].map(c=>`<div onclick="setBg('${sid}','color','${c}')" style="width:22px;height:22px;border-radius:4px;background:${c};border:1px solid rgba(0,0,0,.1);cursor:pointer;transition:transform .1s" title="${c}" onmouseover="this.style.transform='scale(1.15)'" onmouseout="this.style.transform='scale(1)'"></div>`).join('')}
      </div></div>`;
  }
  if(bg.type==='gradient'){
    h+=colorField('Color A',bg.gradA||'#6366F1',`setBg('${sid}','gradA',this.value)`);
    h+=colorField('Color B',bg.gradB||'#EC4899',`setBg('${sid}','gradB',this.value)`);
    h+=chips('Dirección',bg.gradDir||'135deg',[['135deg','↘'],['180deg','↓'],['90deg','→'],['45deg','↗'],['radial','◎']],`setBg('${sid}','gradDir',v)`);
    /* Preset gradients */
    h+=`<div class="prop-group"><label class="prop-label">Gradientes rápidos</label>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px">
        ${[['#6366F1','#EC4899'],['#3B82F6','#06B6D4'],['#10B981','#3B82F6'],['#F59E0B','#EF4444'],['#8B5CF6','#EC4899'],['#111827','#374151'],['#0F172A','#1E293B'],['#064E3B','#065F46']].map(([a,b])=>`<div onclick="setBg('${sid}','gradA','${a}');setBg('${sid}','gradB','${b}')" style="height:28px;border-radius:5px;background:linear-gradient(135deg,${a},${b});cursor:pointer;border:1px solid rgba(255,255,255,.1)" onmouseover="this.style.outline='2px solid var(--accent)'" onmouseout="this.style.outline='none'"></div>`).join('')}
      </div></div>`;
  }
  if(bg.type==='image'){
    h+=imgField('Imagen de fondo',bg.img,`requestImgUpload(url=>{setBg('${sid}','img',url)})`);
    h+=`<div class="prop-group"><label class="prop-label">Posición de imagen</label>
      <div class="chip-row">
        ${[['center center','Centro'],['top center','Arriba'],['bottom center','Abajo'],['center left','Izq'],['center right','Der']].map(([v,l])=>`<span class="chip${(bg.imgPos||'center center')===v?' active':''}" onclick="setBg('${sid}','imgPos','${v}')">${l}</span>`).join('')}
      </div></div>`;
  }

  /* ── OVERLAY ── */
  h+=`<span class="divider-label">🌑 Overlay de color</span>`;
  h+=colorField('Color overlay',sec.overlayColor||'rgba(0,0,0,0.4)',`setSecProp('${sid}','overlayColor',this.value);mu();renderCanvas()`);
  h+=`<div class="prop-group"><label class="prop-label">Opacidad overlay (${sec.overlayOpacity||0}%)</label>
    <input type="range" class="range-field" min="0" max="90" step="5" value="${sec.overlayOpacity||0}"
      oninput="setSecProp('${sid}','overlayOpacity',+this.value);mu();renderCanvas()"></div>`;

  /* ── TEXTO ── */
  h+=`<span class="divider-label">✏️ Texto</span>`;
  h+=colorField('Color del texto',sec.textColor||'#111827',`setSecProp('${sid}','textColor',this.value);mu();renderCanvas()`);
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
    ${[['#111827','Oscuro'],['#ffffff','Blanco'],['#F9FAFB','Gris claro'],['#1E293B','Slate']].map(([c,n])=>`<div onclick="setSecProp('${sid}','textColor','${c}');mu();renderCanvas()" style="padding:6px;border-radius:5px;background:${c==='#ffffff'||c==='#F9FAFB'?'#374151':'#fff'};color:${c};border:1px solid var(--ui-border);cursor:pointer;font-size:.68rem;font-weight:600;text-align:center">${n}</div>`).join('')}
  </div>`;

  /* ── ESPACIADO ── */
  h+=`<span class="divider-label">📐 Espaciado (Padding vertical)</span>`;
  h+=`<div class="chip-row">
    ${[['none','Sin','0px'],['sm','S','32px'],['md','M','50px'],['lg','L','70px'],['xl','XL','90px']].map(([v,l,desc])=>`<span class="chip${(sec.padding||'md')===v?' active':''}" onclick="setSecProp('${sid}','padding','${v}');mu();renderCanvas()" title="${desc}">${l}</span>`).join('')}
  </div>`;
  h+=`<div class="prop-group" style="margin-top:8px"><label class="prop-label">Padding personalizado (px)</label>
    <input type="number" class="prop-input" value="${sec.customPadding||''}" placeholder="Ej: 60"
      oninput="setSecProp('${sid}','customPadding',this.value?+this.value:null);mu();renderCanvas()"></div>`;

  /* ── BORDE ── */
  h+=`<span class="divider-label">🔲 Borde</span>`;
  h+=tog('Activar borde',sec.hasBorder||false,`setSecProp('${sid}','hasBorder',!sec.hasBorder)`);
  if(sec.hasBorder){
    h+=colorField('Color de borde',sec.borderColor||'#E5E7EB',`setSecProp('${sid}','borderColor',this.value);mu();renderCanvas()`);
    h+=`<div class="prop-group"><label class="prop-label">Grosor (${sec.borderWidth||1}px)</label>
      <input type="range" class="range-field" min="1" max="8" step="1" value="${sec.borderWidth||1}"
        oninput="setSecProp('${sid}','borderWidth',+this.value);mu();renderCanvas()"></div>`;
    h+=`<div class="prop-group"><label class="prop-label">Radio de borde (${sec.borderRadius||0}px)</label>
      <input type="range" class="range-field" min="0" max="32" step="2" value="${sec.borderRadius||0}"
        oninput="setSecProp('${sid}','borderRadius',+this.value);mu();renderCanvas()"></div>`;
  }

  /* ── SOMBRA ── */
  h+=`<span class="divider-label">🌘 Sombra</span>`;
  h+=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px">
    ${[['none','Sin',''],['sm','Sutil','0 1px 3px rgba(0,0,0,.08)'],['md','Media','0 4px 16px rgba(0,0,0,.12)'],['lg','Fuerte','0 12px 40px rgba(0,0,0,.2)']].map(([v,l,sh])=>`<div class="shadow-opt${(sec.shadowPreset||'none')===v?' active':''}" onclick="setSecProp('${sid}','shadowPreset','${v}');setSecProp('${sid}','boxShadow','${sh}');mu();renderCanvas()" style="box-shadow:${sh||'none'}">${l}</div>`).join('')}
  </div>`;

  /* ── ANIMACIÓN ── */
  h+=`<span class="divider-label">✨ Animación al aparecer</span>`;
  h+=`<div class="prop-group">
    <select class="prop-input prop-select" onchange="setSecProp('${sid}','animation',this.value);mu()">
      ${[['none','Sin animación'],['fade','Fade In'],['slideUp','Slide Up'],['zoom','Zoom In'],['slideLeft','Slide desde izq'],['slideRight','Slide desde der']].map(([v,l])=>`<option value="${v}"${sec.animation===v?' selected':''}>${l}</option>`).join('')}
    </select></div>`;

  /* ── ID/ANCLA ── */
  h+=`<span class="divider-label">🔗 Enlace de ancla</span>`;
  h+=field('ID de sección','text',sec.anchor||'',`setSecProp('${sid}','anchor',this.value);mu()`,'ej: contacto');
  h+=`<p style="font-size:.63rem;color:var(--ui-text3);margin-top:-6px">Permite navegar a esta sección con #ancla</p>`;

  return`<div>${h}</div>`;
}

/* ═══════════════════════════════════════════════════
   PANEL HELPERS
═══════════════════════════════════════════════════ */
function field(label,type,value,onchange,placeholder=''){
  if(type==='textarea')return`<div class="prop-group">${label?`<label class="prop-label">${label}</label>`:''}<textarea class="prop-input prop-textarea" placeholder="${placeholder}" oninput="${onchange}">${value||''}</textarea></div>`;
  if(type==='number')return`<div class="prop-group">${label?`<label class="prop-label">${label}</label>`:''}<input type="number" class="prop-input" value="${value||''}" placeholder="${placeholder}" oninput="${onchange}"></div>`;
  return`<div class="prop-group">${label?`<label class="prop-label">${label}</label>`:''}<input type="text" class="prop-input" value="${(value||'').toString().replace(/"/g,'&quot;').replace(/'/g,'&#39;')}" placeholder="${placeholder}" oninput="${onchange}"></div>`;
}
function colorField(label,value,onchange){
  const v=value||'#6366F1';const sv=v.length>=7?v.slice(0,7):v;
  return`<div class="prop-group"><label class="prop-label">${label}</label>
    <div class="color-row">
      <input type="color" class="color-swatch" value="${sv}" oninput="${onchange}">
      <input type="text" class="prop-input" value="${v}" placeholder="#000000" oninput="${onchange}">
    </div></div>`;
}
function chips(label,activeVal,opts,onchange){
  const normalized=opts.map(o=>Array.isArray(o)?o:[o,o]);
  return`<div class="prop-group"><label class="prop-label">${label}</label><div class="chip-row">${normalized.map(([v,l])=>`<span class="chip${activeVal===v?' active':''}" onclick="(v=>{${onchange}})(${JSON.stringify(v)});mu();renderCanvas()">${l}</span>`).join('')}</div></div>`;
}
function tog(label,active,onclick){
  return`<div class="toggle-row"><label>${label}</label><button class="tog-sw${active?' on':''}" onclick="${onclick};mu();renderCanvas()"></button></div>`;
}
function imgField(label,src,clickAction,inline=false){
  if(inline)return`<div class="prop-group"><label class="prop-label">${label}</label>${src?`<img src="${src}" style="width:100%;height:58px;object-fit:cover;border-radius:5px;margin-bottom:5px;display:block">`:''}<button onclick="${clickAction}" class="add-sub-btn" style="margin-bottom:0">${src?'🔄 Cambiar imagen':'📤 Subir imagen'}</button></div>`;
  return`<div class="upload-zone" onclick="${clickAction}"><span style="font-size:1.6rem">${src?'✏️':'📤'}</span><p>${src?'Cambiar imagen':'Haz clic para subir'}</p>${src?`<img src="${src}" class="upload-thumb">`:'<p style="font-size:.65rem;opacity:.5;margin-top:3px">JPG, PNG, GIF, WEBP</p>'}</div>`;
}

═══════════════════════════════════════════════════ */
function renderPageTabs(){
  $('pageTabs').innerHTML=site.pages.map(p=>`
    <div class="ptab${p.id===activePage?' active':''}" onclick="setActivePage('${p.id}')">
      ${p.name}
      ${site.pages.length>1?`<span class="ptab-x" onclick="event.stopPropagation();delPage('${p.id}')">✕</span>`:''}
    </div>`).join('');
}
function setActivePage(id){activePage=id;selectedSec=null;renderPageTabs();renderCanvas();renderPanel();}
function addPage(){
  const name=prompt('Nombre de la página:','Nueva página');if(!name)return;
  const pg={id:uid(),name,sections:[mkSec('hero'),mkSec('contacto')]};
  site.pages.push(pg);activePage=pg.id;
  mu();renderPageTabs();renderCanvas();renderPanel();
}
function delPage(id){
  if(site.pages.length===1){toast('No puedes eliminar la única página','error');return;}
  if(!confirm('¿Eliminar esta página?'))return;
  site.pages=site.pages.filter(p=>p.id!==id);
  activePage=site.pages[0].id;
  mu();renderPageTabs();renderCanvas();renderPanel();
}

function setVP(mode,btn){
  vpMode=mode;
  document.querySelectorAll('.vp-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const d=$('canvasDevice');
  d.className='canvas-device';
  d.style.width='';
  const labels={phone:'📱 Móvil — 390px',tablet:'📟 Tablet — 768px',desktop:'🖥 Escritorio — Full'};
  $('vp-label').textContent=labels[mode]||'';
  if(mode==='phone'){d.classList.add('phone-frame');}
  else if(mode==='tablet'){d.classList.add('tablet');}
  else{d.classList.add('desktop');}
  renderCanvas();
}

/* ─── Mobile Content Editor builder ─── */

  if(!sec)return'';

  let html='';

  const mobField=(label,val,key,isTextarea=false)=>`
    <div style="margin-bottom:12px">
      <div style="font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ui-text3);margin-bottom:6px">${label}</div>
      ${isTextarea
        ?`<textarea class="mob-edit-input" rows="3" oninput="secById('${sec.id}').content['${key}']=this.value;mu();renderCanvas()">${val||''}</textarea>`
        :`<input type="text" class="mob-edit-input" style="display:block" value="${(val||'').replace(/"/g,'&quot;')}" oninput="secById('${sec.id}').content['${key}']=this.value;mu();renderCanvas()">`
      }
    </div>`;

  const mobToggle=(label,val,key)=>`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:10px 12px;background:var(--ui-surface2);border-radius:8px">
      <span style="font-size:.78rem;font-weight:600">${label}</span>

        <span class="toggle-slider"></span>
      </label>

  switch(sec.type){
    case 'hero':
      html+=mobField('Título principal',c.h1,'h1');
      html+=mobField('Subtítulo',c.sub,'sub',true);
      html+=mobField('Texto del botón',c.btnText,'btnText');
      html+=`<div style="margin-bottom:12px">
        <div style="font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ui-text3);margin-bottom:6px">Color del botón</div>

    case 'sobre_mi':
      html+=mobField('Título',c.title,'title');
      html+=mobField('Descripción',c.text,'text',true);
      break;
    case 'servicios':
      html+=mobField('Título de sección',c.title,'title');
      html+=mobField('Descripción',c.desc,'desc',true);
      if(c.items){
        html+=`<div style="font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ui-text3);margin-bottom:8px">Servicios</div>`;
        c.items.forEach((item,i)=>{
          html+=`<div style="background:var(--ui-surface2);border-radius:8px;padding:12px;margin-bottom:8px">

              oninput="secById('${sec.id}').content.items[${i}].desc=this.value;mu();renderCanvas()">${item.desc||''}</textarea>

        });

      break;
    case 'contacto':
      html+=mobField('Título',c.title,'title');
      html+=mobField('Email',c.email,'email');
      html+=mobField('Teléfono',c.phone,'phone');
      html+=mobField('Dirección',c.address,'address');
      html+=mobField('Texto del botón',c.btnText,'btnText');

    case 'texto':
      html+=mobField('Título',c.title,'title');
      html+=mobField('Contenido',c.text,'text',true);

    case 'cta':

      html+=`<div style="text-align:center;padding:30px;color:var(--ui-text3)">
        <div style="font-size:2rem;margin-bottom:10px">${SEC_META[sec.type]?.icon||'◻'}</div>
        <div style="font-size:.8rem;margin-bottom:16px">Usa el panel lateral en escritorio para editar todos los campos de esta sección</div>

  </div>`;

  return html;

/* Mobile inline edit overlay helpers */
let _mobEditCallback=null;
function openMobEdit(label,currentVal,callback){
  $('mob-edit-label').textContent=label;
  $('mob-edit-input').value=currentVal||'';
  _mobEditCallback=callback;
  $('mob-edit-overlay').classList.add('open');
  setTimeout(()=>$('mob-edit-input').focus(),300);
}
function saveMobEdit(){
  if(_mobEditCallback)_mobEditCallback($('mob-edit-input').value);
  closeMobEdit();
}
function closeMobEdit(){
  $('mob-edit-overlay').classList.remove('open');
  _mobEditCallback=null;
}

function closeBottomSheet(){
  $('bottom-sheet').classList.remove('open');
  document.querySelectorAll('.bn-btn').forEach(b=>b.classList.remove('active'));
}


/* ═══════════════════════════════════════════════════
   SHARED HTML BUILDER (preview + export)
═══════════════════════════════════════════════════ */
function buildSiteNavHtml(nb,G,forExport=false){
  if(!nb||nb.mode==='off')return'';
  const h=parseInt(nb.height)||56;
  const pcol=nb.primaryColor||G.primaryColor||'#6366F1';
  const tc=nb.visualStyle==='dark'?'#fff':(nb.textColor||'#111');
  const pos=({'sticky':'sticky','fixed':'fixed','overlay':'absolute','float':'absolute','static':'static'}[nb.mode]||'sticky');
  const blur=nb.blurEffect?`backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);`:'';
  const bg=nb.blurEffect?`${nb.bgColor||'#fff'}${Math.round((nb.glassOpacity||80)/100*255).toString(16).padStart(2,'0')}`:nb.visualStyle==='dark'?'#111827':nb.bgColor||'#fff';
  const brd=nb.borderBottom?'border-bottom:1px solid rgba(0,0,0,.08);':''
  const radius=nb.mode==='float'?'50px':'0';
  const margin=nb.mode==='float'?'top:12px;left:16px;right:16px;':'top:0;left:0;right:0;';
  const width=nb.mode==='float'?'calc(100% - 32px)':'100%';
  const style=`position:${pos};${margin}z-index:100;height:${h}px;background:${bg};${blur}${brd}color:${tc};display:flex;align-items:center;gap:14px;padding:0 24px;width:${width};border-radius:${radius};box-sizing:border-box;`;
  const wrapNeeded=nb.mode==='overlay'||nb.mode==='float';
  const links=(nb.links||[]).map(l=>`<a href="${l.url}" style="font-size:.82rem;font-weight:500;opacity:.75;color:inherit;text-decoration:none;transition:opacity .15s">${l.text}</a>`).join('');
  const cta=nb.showLogin?`<a href="${nb.loginUrl||'#'}" style="padding:6px 16px;border-radius:${nb.mode==='float'?'20px':G.radius+'px'};background:${nb.loginStyle==='filled'?pcol:'transparent'};color:${nb.loginStyle==='filled'?'#fff':pcol};border:${nb.loginStyle!=='filled'?'1.5px solid '+pcol:'none'};font-weight:600;font-size:.8rem;text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${nb.loginText||'Acceder'}</a>`:'';
  const navEl=`<nav style="${style}" aria-label="Navegación principal">
    <a href="/" style="font-weight:900;font-size:1.1rem;color:${pcol};text-decoration:none;white-space:nowrap;flex-shrink:0">${nb.logo||'Sitio'}</a>
    <div style="display:flex;gap:14px;flex:1;justify-content:center;overflow:hidden">${links}</div>
    <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
      ${nb.showCart?`<a href="#" style="font-size:1rem;color:${tc};text-decoration:none">🛒</a>`:''}
      ${cta}
    </div>
  </nav>`;
  return wrapNeeded?`<div style="position:relative">${navEl}</div>`:navEl;
}

/* ═══════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveData();}
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();redo();}
  if((e.ctrlKey||e.metaKey)&&e.key==='p'){e.preventDefault();openPreview();}
  if(e.key==='Escape'){closeBottomSheet();closeMobEdit();closeAddSec();closePreview();closeShortcuts();hideCtxMenu();}
  // Copy/paste/duplicate sections
  if(!e.target.closest('[contenteditable]')&&!e.target.closest('input')&&!e.target.closest('textarea')){
    if((e.ctrlKey||e.metaKey)&&e.key==='c'&&selectedSec){e.preventDefault();copySec(selectedSec);}
    if((e.ctrlKey||e.metaKey)&&e.key==='v'){e.preventDefault();pasteSec();}
    if((e.ctrlKey||e.metaKey)&&e.key==='d'&&selectedSec){e.preventDefault();dupSec(selectedSec);}
    if(e.key==='Delete'&&selectedSec){if(confirm('¿Eliminar sección seleccionada?'))delSec(selectedSec);}
    if(e.key==='?'){openShortcuts();}
    // Arrow keys to move selection
    if(e.key==='ArrowUp'&&selectedSec&&(e.ctrlKey||e.metaKey)){e.preventDefault();moveSec(selectedSec,-1);}
    if(e.key==='ArrowDown'&&selectedSec&&(e.ctrlKey||e.metaKey)){e.preventDefault();moveSec(selectedSec,1);}
  }
  // Zoom shortcuts
  if((e.ctrlKey||e.metaKey)&&(e.key==='+'||e.key==='=')){e.preventDefault();zoomIn();}
  if((e.ctrlKey||e.metaKey)&&e.key==='-'){e.preventDefault();zoomOut();}
  if((e.ctrlKey||e.metaKey)&&e.key==='0'){e.preventDefault();zoomReset();}
});

/* ═══════════════════════════════════════════════════
   COPY / PASTE SECTIONS
═══════════════════════════════════════════════════ */
let copiedSec=null;

function copySec(id){
  const sec=secById(id||selectedSec);
  if(!sec)return;
  copiedSec=JSON.parse(JSON.stringify(sec));
  const el=$('cs_'+sec.id);
  if(el){el.classList.add('copy-flash');setTimeout(()=>el.classList.remove('copy-flash'),450);}
  toast('📋 Sección copiada','info',1600);
}

function pasteSec(){
  if(!copiedSec){toast('No hay sección copiada','error',1600);return;}
  const secs=page().sections;
  const clone=JSON.parse(JSON.stringify(copiedSec));
  clone.id=uid();clone.name+=' (pegada)';
  const idx=selectedSec?secs.findIndex(s=>s.id===selectedSec):secs.length-1;
  secs.splice(idx+1,0,clone);
  selectedSec=clone.id;
  mu();renderCanvas();renderPanel();
  toast('📌 Sección pegada','success');
}

/* ═══════════════════════════════════════════════════
   CANVAS ZOOM
═══════════════════════════════════════════════════ */
let canvasZoom=1;
const ZOOM_STEPS=[0.25,0.4,0.5,0.67,0.75,0.9,1,1.1,1.25,1.5,1.75,2];

function applyZoom(z){
  canvasZoom=Math.max(0.25,Math.min(2,z));
  const wrap=document.querySelector('#editor-canvas > div');
  if(wrap){
    wrap.style.transform=`scale(${canvasZoom})`;
    wrap.style.transformOrigin='top center';
  }
  const lbl=$('zoom-label');
  if(lbl)lbl.textContent=Math.round(canvasZoom*100)+'%';
}
function zoomIn(){const next=ZOOM_STEPS.find(z=>z>canvasZoom+0.01);applyZoom(next||2);}
function zoomOut(){const prev=[...ZOOM_STEPS].reverse().find(z=>z<canvasZoom-0.01);applyZoom(prev||0.25);}
function zoomReset(){applyZoom(1);}

// Inject zoom bar
document.body.insertAdjacentHTML('beforeend',`
  <div id="canvas-zoom-bar">
    <button class="zoom-btn" onclick="zoomOut()" title="Alejar (Ctrl+-)">−</button>
    <span id="zoom-label" onclick="zoomReset()" title="Zoom 100% (Ctrl+0)">100%</span>
    <button class="zoom-btn" onclick="zoomIn()" title="Acercar (Ctrl+=)">+</button>
  </div>
`);

// Ctrl+Wheel zoom
$('editor-canvas').addEventListener('wheel',e=>{
  if(!e.ctrlKey&&!e.metaKey)return;
  e.preventDefault();
  if(e.deltaY<0)zoomIn();else zoomOut();
},{passive:false});

  ctxMenu.style.left=left+'px';
  ctxMenu.style.top=top+'px';
  ctxMenu.classList.add('visible');
}

function hideCtxMenu(){ctxMenu.classList.remove('visible');}

      <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="0" y="1" width="14" height="2" rx="1"/><rect x="2.5" y="5" width="9" height="2" rx="1"/><rect x="1" y="9" width="12" height="2" rx="1"/></svg>
    </button>
    <button class="rtt-btn" data-cmd="justifyRight" title="Alinear derecha">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="0" y="1" width="14" height="2" rx="1"/><rect x="5" y="5" width="9" height="2" rx="1"/><rect x="2" y="9" width="12" height="2" rx="1"/></svg>
    </button>
    <div class="rtt-sep"></div>
    <input type="color" class="rtt-color" id="rtt-color" title="Color de texto" value="#111827">
    <button class="rtt-btn" data-cmd="removeFormat" title="Quitar formato" style="font-size:.68rem;opacity:.7">✕f</button>
  `;
  document.body.appendChild(tb);

  let hideT;

  function positionToolbar(x,y){
    clearTimeout(hideT);
    const tw=tb.offsetWidth||300;
    const vw=window.innerWidth;
    let left=x-tw/2;
    if(left<8)left=8;
    if(left+tw>vw-8)left=vw-tw-8;
    tb.style.left=left+'px';
    tb.style.top=(y-52)+'px';
    tb.classList.add('visible');
    syncState();
  }

  function syncState(){
    try{
      ['bold','italic','underline','strikeThrough','justifyLeft','justifyCenter','justifyRight'].forEach(cmd=>{
        const btn=tb.querySelector(`[data-cmd="${cmd}"]`);
        if(btn)btn.classList.toggle('active',document.queryCommandState(cmd));
      });
    }catch(e){}
  }

  // Execute formatting commands
  tb.querySelectorAll('[data-cmd]').forEach(btn=>{
    btn.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();
      document.execCommand(btn.dataset.cmd,false,null);
      syncState();mu();
    });
  });

  // Font size via span wrapping
  const fsEl=document.getElementById('rtt-fontsize');
  if(fsEl)fsEl.addEventListener('change',function(){
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed)return;
    document.execCommand('fontSize',false,'7');
    document.querySelectorAll('font[size="7"]').forEach(f=>{
      const span=document.createElement('span');
      span.style.fontSize=this.value+'px';
      f.parentNode.insertBefore(span,f);
      while(f.firstChild)span.appendChild(f.firstChild);
      f.remove();
    });
    mu();
  });

  // Color picker
  const colEl=document.getElementById('rtt-color');
  if(colEl)colEl.addEventListener('input',function(){
    document.execCommand('foreColor',false,this.value);mu();
  });

  // Show toolbar on text selection
  document.addEventListener('mouseup',e=>{
    if(e.target.closest('#rich-text-toolbar'))return;
    setTimeout(()=>{
      const sel=window.getSelection();
      if(!sel||sel.isCollapsed||!sel.toString().trim()){hideT=setTimeout(()=>tb.classList.remove('visible'),150);return;}
      const node=sel.getRangeAt(0).commonAncestorContainer;
      const ce=node.nodeType===3?node.parentElement?.closest('[contenteditable]'):node.closest?.('[contenteditable]');
      if(!ce){tb.classList.remove('visible');return;}
      const rect=sel.getRangeAt(0).getBoundingClientRect();
      positionToolbar(rect.left+rect.width/2,rect.top);
    },10);
  });

  document.addEventListener('mousedown',e=>{
    if(!e.target.closest('#rich-text-toolbar')&&!e.target.closest('[contenteditable]')){
      tb.classList.remove('visible');
    }
  });

  // Keep visible on hover
  tb.addEventListener('mouseenter',()=>clearTimeout(hideT));
  tb.addEventListener('mouseleave',()=>{hideT=setTimeout(()=>tb.classList.remove('visible'),300);});
})();

/* ═══════════════════════════════════════════════════
   SNAP GUIDES (event delegation on stable parent)
═══════════════════════════════════════════════════ */
// Use event delegation so guides work after every renderCanvas()
$('editor-canvas').addEventListener('dragover',e=>{
  const cs=$('canvas-sections');if(!cs)return;
  const dragging=cs.querySelector('.cs-wrap.dragging');
  if(!dragging)return;
  // Remove old guides
  cs.querySelectorAll('.snap-guide-h').forEach(g=>g.remove());
  // Find nearest center
  const wraps=[...cs.querySelectorAll('.cs-wrap:not(.dragging)')];
  wraps.forEach(w=>{
    const rect=w.getBoundingClientRect();
    const center=rect.top+rect.height/2;
    if(Math.abs(e.clientY-center)<24){
      const csRect=cs.getBoundingClientRect();
      const guide=document.createElement('div');
      guide.className='snap-guide-h';
      guide.style.top=(center-csRect.top)+'px';
      cs.style.position='relative';
      cs.appendChild(guide);
    }
  });
});
$('editor-canvas').addEventListener('drop',()=>{
  const cs=$('canvas-sections');
  if(cs)cs.querySelectorAll('.snap-guide-h').forEach(g=>g.remove());
});
$('editor-canvas').addEventListener('dragleave',e=>{
  if(!$('editor-canvas').contains(e.relatedTarget)){
    const cs=$('canvas-sections');
    if(cs)cs.querySelectorAll('.snap-guide-h').forEach(g=>g.remove());
  }
});

function openAdminPanel(){

function closeAdminPanel(){$('admin-panel').classList.remove('open');}

function switchAdmTab(tab,btn,force=false){
  if(!force&&!btn)return;
  document.querySelectorAll('.adm-tab').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  else{const b=document.querySelector(`.adm-tab[onclick*="${tab}"]`);if(b)b.classList.add('active');}
  const body=$('adm-body');
  switch(tab){
    case 'colores':   body.innerHTML=admColorsPanel(); break;
    case 'tipografia':body.innerHTML=admTypoPanel();   break;
    case 'secciones': body.innerHTML=admSecPanel();    break;
    case 'sitio':     body.innerHTML=admSitePanel();   break;
  }
}

    </div>`;
}

/* ═══════════════════════════════════════════════════
   🎨  PAINT TOOL — LIENZO DE IDEAS
═══════════════════════════════════════════════════ */
const paintState={
  tool:'pencil',color:'#111827',size:3,
  drawing:false,startX:0,startY:0,
  snapshot:null,history:[],histIdx:-1,
  sid:null,canvas:null,ctx:null,
};

function openPaintModal(sid){
  paintState.sid=sid;
  const modal=$('paint-modal');
  const canvas=$('paint-canvas');
  modal.classList.add('open');

  // Responsive canvas size
  const area=modal.querySelector('.paint-canvas-wrap');
  const W=Math.min(1200,area.clientWidth-40||1000);
  const H=Math.min(700,area.clientHeight-40||600);
  canvas.width=W; canvas.height=H;
  paintState.canvas=canvas;
  paintState.ctx=canvas.getContext('2d');

  // White background
  const ctx=paintState.ctx;
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,W,H);

  // Load existing drawing if any
  const sec=secById(sid);
  if(sec?.content?.drawing){
    const img=new Image();
    img.onload=()=>{ctx.drawImage(img,0,0,W,H);pushPaintHistory();};
    img.src=sec.content.drawing;
  } else {
    pushPaintHistory();
  }

  // Reset tool UI
  document.querySelectorAll('.pt-btn').forEach(b=>b.classList.remove('active'));
  const pencilBtn=document.querySelector('[data-tool="pencil"]');
  if(pencilBtn)pencilBtn.classList.add('active');
  paintState.tool='pencil';

  initPaintEvents();
}

function closePaintModal(){
  $('paint-modal').classList.remove('open');
  // Remove events by replacing canvas
  const old=$('paint-canvas');
  const fresh=old.cloneNode(false);
  old.parentNode.replaceChild(fresh,old);
  paintState.canvas=null;paintState.ctx=null;paintState.sid=null;
  paintState.history=[];paintState.histIdx=-1;
}

function savePainting(){
  const canvas=$('paint-canvas');
  if(!canvas||!paintState.sid)return;
  const sec=secById(paintState.sid);
  if(sec?.content){
    sec.content.drawing=canvas.toDataURL('image/png');
    mu();renderCanvas();
  }
  closePaintModal();
  toast('🎨 Idea guardada','success',2000);
}

function pushPaintHistory(){
  const canvas=paintState.canvas;
  if(!canvas)return;
  // Trim forward history
  if(paintState.histIdx<paintState.history.length-1)
    paintState.history=paintState.history.slice(0,paintState.histIdx+1);
  paintState.history.push(canvas.toDataURL());
  if(paintState.history.length>40)paintState.history.shift();
  paintState.histIdx=paintState.history.length-1;
}

function paintUndo(){
  if(paintState.histIdx<=0)return;
  paintState.histIdx--;
  const img=new Image();
  img.onload=()=>{
    const ctx=paintState.ctx;
    ctx.clearRect(0,0,paintState.canvas.width,paintState.canvas.height);
    ctx.drawImage(img,0,0);
  };
  img.src=paintState.history[paintState.histIdx];
}

function paintClear(){
  if(!confirm('¿Limpiar todo el lienzo?'))return;
  const {ctx,canvas}=paintState;
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  pushPaintHistory();
}

function paintImgUpload(){$('paint-img-input').click();}

function paintInsertImage(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const {ctx,canvas}=paintState;
      // Center the image, scale to fit
      const scale=Math.min(canvas.width/img.width,canvas.height/img.height,1)*0.8;
      const w=img.width*scale,h=img.height*scale;
      const x=(canvas.width-w)/2,y=(canvas.height-h)/2;
      ctx.drawImage(img,x,y,w,h);
      pushPaintHistory();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
  input.value='';
}

function setPaintTool(tool,btn){
  paintState.tool=tool;
  document.querySelectorAll('.pt-btn[data-tool]').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
}

function initPaintEvents(){
  const canvas=$('paint-canvas');
  if(!canvas)return;
  let isDown=false;

  function getPos(e){
    const r=canvas.getBoundingClientRect();
    const sx=canvas.width/r.width, sy=canvas.height/r.height;
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-r.left)*sx, y:(src.clientY-r.top)*sy};
  }

  function down(e){
    e.preventDefault();
    isDown=true;
    const {x,y}=getPos(e);
    paintState.startX=x;paintState.startY=y;
    paintState.snapshot=paintState.ctx.getImageData(0,0,canvas.width,canvas.height);
    if(paintState.tool==='text'){
      const txt=prompt('Escribe el texto:');
      if(txt){
        const ctx=paintState.ctx;
        ctx.font=`${Math.max(14,paintState.size*5)}px sans-serif`;
        ctx.fillStyle=paintState.color;
        ctx.fillText(txt,x,y);
        pushPaintHistory();
      }
      isDown=false;
    }
  }

  function move(e){
    if(!isDown)return;
    e.preventDefault();
    const {x,y}=getPos(e);
    const ctx=paintState.ctx;
    const {tool,color,size,startX,startY,snapshot}=paintState;

    if(tool==='pencil'||tool==='eraser'){
      ctx.beginPath();
      ctx.strokeStyle=tool==='eraser'?'#ffffff':color;
      ctx.lineWidth=tool==='eraser'?size*4:size;
      ctx.lineCap='round';ctx.lineJoin='round';
      ctx.moveTo(paintState.lastX??x,paintState.lastY??y);
      ctx.lineTo(x,y);ctx.stroke();
      paintState.lastX=x;paintState.lastY=y;
    } else {
      ctx.putImageData(snapshot,0,0);
      ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=size;
      if(tool==='line'){
        ctx.beginPath();ctx.moveTo(startX,startY);ctx.lineTo(x,y);ctx.stroke();
      } else if(tool==='rect'){
        ctx.strokeRect(startX,startY,x-startX,y-startY);
      } else if(tool==='rect-fill'){
        ctx.fillRect(startX,startY,x-startX,y-startY);
      } else if(tool==='circle'||tool==='circle-fill'){
        const rx=Math.abs(x-startX)/2,ry=Math.abs(y-startY)/2;
        const cx=startX+(x-startX)/2,cy=startY+(y-startY)/2;
        ctx.beginPath();ctx.ellipse(cx,cy,rx||1,ry||1,0,0,Math.PI*2);
        tool==='circle-fill'?ctx.fill():ctx.stroke();
      }
    }
  }

  function up(e){
    if(!isDown)return;
    isDown=false;
    paintState.lastX=null;paintState.lastY=null;
    if(!['text'].includes(paintState.tool))pushPaintHistory();
  }

  canvas.addEventListener('mousedown',down);
  canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',up);
  canvas.addEventListener('mouseleave',up);
  canvas.addEventListener('touchstart',down,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  canvas.addEventListener('touchend',up);
}

// Keyboard shortcut for paint undo
document.addEventListener('keydown',e=>{
  if(!$('paint-modal').classList.contains('open'))return;
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();paintUndo();}
  if(e.key==='Escape')closePaintModal();
});
